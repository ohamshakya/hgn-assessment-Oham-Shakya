services:
  postgres:
    image: postgres:16
    container_name: postgres

    environment:
      POSTGRES_DB: himalayan_task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5433"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8081:8081"

volumes:
  postgres_data: