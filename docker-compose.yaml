services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: himalayan_task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

  app:
    build: src

    depends_on:
      - postgres

    ports:
      - "8081:8081"

    environment:
    - spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:hospital_db}
    - spring.datasource.username=${POSTGRES_USER:postgres}
    - spring.datasource.password=${POSTGRES_PASSWORD:postgres}
    - server.port=${SPRING_PORT}